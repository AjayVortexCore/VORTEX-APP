name: Build
on: [push, workflow_dispatch]
jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build APK
        uses: ArtemSerebrenninkov/buildozer-action@v1
        with:
          buildozer_version: stable
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Vortex-App
          path: bin/*.apk
